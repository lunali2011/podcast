<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Luna的播客测试版 | 夜色风格</title>
    <style>
        :root {
            --bg: #0d1429;
            --panel: rgba(18, 25, 48, 0.9);
            --panel-soft: rgba(23, 32, 60, 0.82);
            --text: #f4f7ff;
            --muted: #9fadd0;
            --accent: #88a2ff;
            --accent-soft: rgba(136, 162, 255, 0.14);
            --line: rgba(167, 186, 255, 0.14);
            --shadow: 0 18px 40px rgba(4, 8, 22, 0.34);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(109, 125, 255, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(71, 131, 255, 0.14), transparent 22%),
                linear-gradient(160deg, #0b1124 0%, #0f1933 52%, #182955 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 18px 18px 120px;
        }

        button {
            font: inherit;
        }

        .app {
            width: min(100%, 420px);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .brand {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .brand-logo {
            width: 54px;
            height: 54px;
            display: block;
        }

        .brand-name {
            font-size: 13px;
            color: var(--text);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(22, 31, 58, 0.92);
            color: var(--muted);
            font-size: 13px;
            border: 1px solid var(--line);
        }

        .page-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.03em;
        }

        .card-list {
            display: grid;
            gap: 12px;
        }

        .podcast-card {
            width: 100%;
            text-align: left;
            cursor: pointer;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 14px;
            background:
                radial-gradient(circle at top right, rgba(136, 162, 255, 0.12), transparent 26%),
                linear-gradient(180deg, rgba(24, 34, 64, 0.96), rgba(16, 23, 46, 0.98));
            box-shadow: 0 14px 30px rgba(3, 7, 20, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .podcast-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .podcast-card.is-playing {
            border-color: rgba(136, 162, 255, 0.34);
            box-shadow: 0 18px 34px rgba(14, 22, 54, 0.46);
        }

        .card-top {
            margin-bottom: 10px;
        }

        .card-tags,
        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(136, 162, 255, 0.12);
            color: var(--accent);
            font-size: 12px;
        }

        .card-title {
            font-size: 19px;
            line-height: 1.4;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .detail-sheet {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left, rgba(109, 125, 255, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(71, 131, 255, 0.14), transparent 22%),
                linear-gradient(160deg, #0b1124 0%, #0f1933 52%, #182955 100%);
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 16px 120px;
            z-index: 20;
            overflow-y: auto;
        }

        .detail-sheet.show {
            display: flex;
        }

        .detail-card {
            width: min(100%, 420px);
        }

        .detail-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .detail-close {
            min-width: 64px;
            height: 36px;
            border-radius: 999px;
            border: 1px solid var(--line);
            padding: 0 14px;
            background: rgba(22, 31, 58, 0.92);
            color: var(--accent);
            font-size: 14px;
        }

        .detail-hero {
            background:
                radial-gradient(circle at top right, rgba(136, 162, 255, 0.14), transparent 24%),
                linear-gradient(180deg, rgba(21, 31, 60, 0.98), rgba(16, 23, 46, 0.98));
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }

        .detail-cover {
            height: 168px;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 78% 24%, rgba(255, 255, 255, 0.18), transparent 16%),
                linear-gradient(135deg, #5f73ff 0%, #5674d9 42%, #1f7dc2 100%);
            color: #f7f9ff;
        }

        .detail-cover::after {
            content: "";
            position: absolute;
            inset: auto -24px -34px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), transparent 70%);
        }

        .detail-cover-label {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            font-size: 12px;
            margin-bottom: 18px;
        }

        .detail-cover-title {
            max-width: 8em;
            font-size: 28px;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .detail-title {
            font-size: 28px;
            line-height: 1.25;
            font-weight: 700;
            margin: 10px 0 6px;
        }

        .detail-subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .detail-summary {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 14px;
        }

        .detail-intro {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .detail-desc {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .detail-section-title {
            font-size: 18px;
            font-weight: 700;
            margin: 4px 0 12px;
        }

        .detail-episodes {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .detail-episode {
            width: 100%;
            text-align: left;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: linear-gradient(180deg, rgba(28, 38, 72, 0.56), rgba(19, 27, 52, 0.5));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 10px 24px rgba(4, 8, 22, 0.18);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .detail-episode.is-playing {
            border-color: rgba(136, 162, 255, 0.28);
            background: linear-gradient(180deg, rgba(52, 67, 118, 0.68), rgba(28, 40, 76, 0.56));
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 12px 26px rgba(5, 10, 28, 0.24);
        }

        .detail-episode-index {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(136, 162, 255, 0.14);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
        }

        .detail-episode-body {
            min-width: 0;
        }

        .detail-episode-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.45;
            margin-bottom: 4px;
            color: #f4f7ff;
        }

        .detail-episode-meta {
            color: var(--muted);
            font-size: 12px;
        }

        .detail-episode-play {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
        }

        .detail-episode.is-playing .detail-episode-play {
            background: var(--accent);
            color: #f7f9ff;
        }

        .player {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 30;
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .player.is-visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .player-inner {
            width: min(100%, 420px);
            margin: 0 auto;
            background:
                radial-gradient(circle at top right, rgba(136, 162, 255, 0.1), transparent 24%),
                linear-gradient(180deg, rgba(22, 31, 58, 0.96), rgba(16, 23, 46, 0.98));
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
            box-shadow: 0 20px 40px rgba(5, 10, 28, 0.28);
        }

        .player-row {
            display: grid;
            grid-template-columns: 54px 1fr auto;
            gap: 12px;
            align-items: center;
        }

        .player-cover {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #5f73ff 0%, #1f7dc2 100%);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
        }

        .player-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .player-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 4px rgba(136, 162, 255, 0.14);
        }

        .player-name {
            font-size: 14px;
            color: var(--text);
            line-height: 1.4;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 4px;
        }

        .player-time-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .player-time-separator {
            color: var(--muted);
            font-size: 12px;
        }

        .player-time,
        .player-duration {
            color: var(--muted);
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }

        .player-progress {
            margin-top: 6px;
            height: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .player-progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #88a2ff 0%, #5f73ff 100%);
            box-shadow: 0 0 12px rgba(95, 115, 255, 0.24);
        }

        .player-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 18px;
        }

        .icon-btn.primary {
            background: linear-gradient(135deg, #7c92ff, #6076ff);
            color: #f7f9ff;
            box-shadow: 0 10px 20px rgba(70, 92, 194, 0.32);
        }

        .speed-btn {
            min-width: 42px;
            height: 32px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(22, 31, 58, 0.92);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            padding: 0 10px;
        }

        .topbar-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-new-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            padding: 0 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, #879cff, #6178ff);
            color: #f7f9ff;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 12px 24px rgba(66, 89, 197, 0.32);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .topbar-new-btn:active {
            transform: translateY(1px);
            box-shadow: 0 6px 14px rgba(66, 89, 197, 0.32);
        }

        .topbar-new-btn::before {
            content: "+";
            font-size: 16px;
            line-height: 1;
            margin-right: 1px;
        }

        .card-empty {
            padding: 22px 20px;
            border: 1px dashed var(--line);
            border-radius: 18px;
            background: rgba(18, 25, 48, 0.62);
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
            text-align: center;
        }

        .card-empty a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="topbar">
            <div class="brand">
                <img class="brand-logo" src="./logo-luna.svg" alt="Luna的播客 logo">
                <div class="brand-name">Luna的播客</div>
            </div>
            <div class="topbar-actions">
                <a class="topbar-new-btn" href="./studio.html">新建专辑</a>
            </div>
        </div>

        <h1 class="page-title">发现</h1>

        <section class="card-list" id="cardList"></section>
    </main>

    <div class="detail-sheet" id="detailSheet">
        <div class="detail-card">
            <div class="detail-head">
                <div class="badge">专辑页</div>
                <button class="detail-close" id="detailClose">返回</button>
            </div>
            <div class="detail-hero">
                <div class="detail-cover" id="detailCover">
                    <div class="detail-cover-label">专辑封面</div>
                    <div class="detail-cover-title" id="detailCoverTitle"></div>
                </div>
                <div class="detail-tags" id="detailTags"></div>
                <div class="detail-title" id="detailTitle"></div>
                <div class="detail-subtitle" id="detailSubtitle"></div>
                <div class="detail-summary" id="detailSummary"></div>
                <div class="detail-desc" id="detailDesc"></div>
            </div>
            <div class="detail-section-title">节目列表</div>
            <div class="detail-episodes" id="detailEpisodes"></div>
        </div>
    </div>

    <div class="player" id="playerBar">
        <div class="player-inner">
            <div class="player-row">
                <div class="player-cover"></div>
                <div>
                    <div class="player-status"><span class="player-dot"></span><span id="playerStatusText">未播放</span></div>
                    <div class="player-name">点击节目开始播放</div>
                    <div class="player-meta">选择一集后，这里会显示当前节目</div>
                </div>
                <div class="player-actions">
                    <button class="icon-btn primary" id="playToggleBtn">▶</button>
                </div>
            </div>
                <div class="player-meta-row">
                    <div class="player-time-group">
                        <span class="player-time" id="playerTime">0:00</span>
                        <span class="player-time-separator">/</span>
                        <span class="player-duration" id="playerDuration">0:00</span>
                    </div>
                <button class="speed-btn" id="speedBtn">1x</button>
            </div>
            <div class="player-progress">
                <div class="player-progress-bar" id="playerProgressBar"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script src="./site-config.js"></script>
    <script>
        const API_BASE = (window.LUNA_API_BASE || "").replace(/\/$/, "");

        let albums = [];
        let currentAlbum = null;

        const audio = document.getElementById("audioPlayer");
        const cardList = document.getElementById("cardList");
        const detailSheet = document.getElementById("detailSheet");
        const detailClose = document.getElementById("detailClose");
        const detailEpisodes = document.getElementById("detailEpisodes");
        const detailCover = document.getElementById("detailCover");
        const detailCoverTitle = document.getElementById("detailCoverTitle");
        const detailTags = document.getElementById("detailTags");
        const detailTitle = document.getElementById("detailTitle");
        const detailSubtitle = document.getElementById("detailSubtitle");
        const detailSummary = document.getElementById("detailSummary");
        const detailDesc = document.getElementById("detailDesc");
        const playerBar = document.getElementById("playerBar");
        const playerName = document.querySelector(".player-name");
        const playerMeta = document.querySelector(".player-meta");
        const playerTime = document.getElementById("playerTime");
        const playerDuration = document.getElementById("playerDuration");
        const playerStatusText = document.getElementById("playerStatusText");
        const playerProgressBar = document.getElementById("playerProgressBar");
        const speedBtn = document.getElementById("speedBtn");
        const playToggleBtn = document.getElementById("playToggleBtn");
        const speeds = [1, 1.25, 1.5, 2];
        let speedIndex = 0;
        let currentEpisodeData = null;

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, "0")}`;
        }

        function resolveAudioPath(audioUrl) {
            if (!audioUrl) return "";
            if (/^https?:\/\//i.test(audioUrl)) return audioUrl;
            if (audioUrl.startsWith("./") || audioUrl.startsWith("../") || audioUrl.startsWith("/")) return audioUrl;
            return `./${audioUrl}`;
        }

        function apiUrl(path) {
            if (!API_BASE) return path;
            return `${API_BASE}${path}`;
        }

        function renderAlbumCards() {
            if (!albums.length) {
                cardList.innerHTML = `
                    <div class="card-empty">
                        还没有专辑。去 <a href="./studio.html">新建一张</a>，出品后就会出现在这里。
                    </div>`;
                return;
            }
            cardList.innerHTML = albums.map((album) => {
                const tags = (album.tags || []).slice(0, 2).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
                const count = `<span class="tag">${escapeHtml(album.episodeCount || (album.episodes || []).length)} 集</span>`;
                return `
                    <button class="podcast-card" data-album-id="${escapeHtml(album.id)}">
                        <div class="card-top">
                            <div class="card-tags">${tags}${count}</div>
                        </div>
                        <div class="card-title">${escapeHtml(album.title)}</div>
                        ${album.subtitle ? `<div class="card-subtitle">${escapeHtml(album.subtitle)}</div>` : ""}
                        <div class="card-desc">${escapeHtml(album.cardDescription || album.description || "")}</div>
                    </button>
                `;
            }).join("");

            cardList.querySelectorAll(".podcast-card").forEach((cardBtn) => {
                cardBtn.addEventListener("click", () => {
                    const album = albums.find((item) => item.id === cardBtn.dataset.albumId);
                    if (album) openAlbumDetail(album);
                });
            });
        }

        function openAlbumDetail(album) {
            currentAlbum = album;
            if (album.coverGradient) {
                detailCover.style.background = album.coverGradient;
            }
            detailCoverTitle.textContent = album.title || "";
            detailTags.innerHTML = (album.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
            detailTitle.textContent = album.title || "";
            detailSubtitle.textContent = album.subtitle || "";
            const summaryParts = [];
            const epCount = album.episodeCount || (album.episodes || []).length;
            if (epCount) summaryParts.push(`${epCount} 集`);
            if (album.totalDurationLabel) summaryParts.push(album.totalDurationLabel);
            detailSummary.textContent = summaryParts.join(" · ");
            detailDesc.textContent = album.description || "";
            renderEpisodes(album);
            detailSheet.classList.add("show");
            detailSheet.scrollTop = 0;
        }

        function renderEpisodes(album) {
            const episodes = album.episodes || [];
            detailEpisodes.innerHTML = episodes.map((episode) => `
                <button class="detail-episode" data-audio="${escapeHtml(resolveAudioPath(episode.audioUrl))}" data-title="${escapeHtml(episode.title || "")}" data-duration="${escapeHtml(episode.durationLabel || "")}">
                    <div class="detail-episode-index">${escapeHtml(episode.index || "")}</div>
                    <div class="detail-episode-body">
                        <div class="detail-episode-title">${escapeHtml(episode.title || "")}</div>
                        <div class="detail-episode-meta">${escapeHtml(album.title || "")} · ${escapeHtml(episode.durationLabel || "")}</div>
                    </div>
                    <div class="detail-episode-play">▶</div>
                </button>
            `).join("");

            detailEpisodes.querySelectorAll(".detail-episode").forEach((episodeBtn) => {
                episodeBtn.addEventListener("click", () => {
                    const audioSrc = episodeBtn.dataset.audio;
                    if (!audioSrc) return;
                    const targetSrc = audioSrc.replace("./", "");
                    const currentSrc = decodeURI(audio.currentSrc || "");
                    const isCurrent = currentSrc.endsWith(targetSrc);
                    const albumTitle = currentAlbum?.title || "";

                    if (isCurrent) {
                        if (audio.paused) {
                            playerMeta.textContent = albumTitle;
                            playerStatusText.textContent = "播放中";
                            audio.playbackRate = speeds[speedIndex];
                            audio.play();
                        } else {
                            playerMeta.textContent = albumTitle;
                            playerStatusText.textContent = "已暂停";
                            audio.pause();
                        }
                    } else {
                        currentEpisodeData = {
                            title: episodeBtn.dataset.title,
                            duration: episodeBtn.dataset.duration,
                            audio: audioSrc
                        };
                        playerName.textContent = episodeBtn.dataset.title;
                        playerMeta.textContent = albumTitle;
                        playerStatusText.textContent = "播放中";
                        playerTime.textContent = "0:00";
                        playerDuration.textContent = episodeBtn.dataset.duration || "0:00";
                        audio.src = encodeURI(audioSrc);
                        audio.playbackRate = speeds[speedIndex];
                        audio.play();
                    }

                    playerBar.classList.add("is-visible");
                    updateEpisodePlaybackUI();
                });
            });
        }

        function updateEpisodePlaybackUI() {
            const currentSrc = decodeURI(audio.currentSrc || "");
            const albumTitle = currentAlbum?.title || "";
            detailEpisodes.querySelectorAll(".detail-episode").forEach((episodeBtn) => {
                const normalized = (episodeBtn.dataset.audio || "").replace("./", "");
                const isCurrent = normalized && currentSrc.endsWith(normalized);
                const isPlaying = isCurrent && !audio.paused;
                episodeBtn.classList.toggle("is-playing", isPlaying);

                const playIcon = episodeBtn.querySelector(".detail-episode-play");
                if (playIcon) playIcon.textContent = isPlaying ? "❚❚" : "▶";

                const meta = episodeBtn.querySelector(".detail-episode-meta");
                if (meta && isCurrent) {
                    meta.textContent = `${albumTitle} · ${audio.paused ? "已暂停" : "播放中"}`;
                } else if (meta) {
                    meta.textContent = `${albumTitle} · ${episodeBtn.dataset.duration || ""}`;
                }
            });
        }

        async function loadAlbums() {
            const fallbackToLocal = async () => {
                const response = await fetch("./albums.json", { cache: "no-store" });
                const data = await response.json();
                return Array.isArray(data.albums) ? data.albums : [];
            };

            try {
                if (API_BASE) {
                    try {
                        const response = await fetch(apiUrl("/api/albums"), { cache: "no-store" });
                        if (!response.ok) {
                            throw new Error(`API request failed with status ${response.status}`);
                        }
                        const data = await response.json();
                        albums = Array.isArray(data.albums) ? data.albums : [];
                    } catch (error) {
                        albums = await fallbackToLocal();
                    }
                } else {
                    albums = await fallbackToLocal();
                }
            } catch (error) {
                albums = [];
            }
            renderAlbumCards();

            const targetId = new URLSearchParams(window.location.search).get("album");
            if (targetId) {
                const match = albums.find((item) => item.id === targetId);
                if (match) openAlbumDetail(match);
            }
        }

        detailClose.addEventListener("click", () => {
            detailSheet.classList.remove("show");
        });

        playToggleBtn.addEventListener("click", () => {
            if (!audio.src) return;
            if (audio.paused) {
                playerStatusText.textContent = "播放中";
                playerMeta.textContent = "宇宙观与现代世界";
                audio.playbackRate = speeds[speedIndex];
                audio.play();
            } else {
                playerStatusText.textContent = "已暂停";
                playerMeta.textContent = "宇宙观与现代世界";
                audio.pause();
            }
        });

        speedBtn.addEventListener("click", () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            audio.playbackRate = speeds[speedIndex];
            speedBtn.textContent = `${speeds[speedIndex]}x`;
        });

        audio.addEventListener("play", () => {
            playToggleBtn.textContent = "❚❚";
            playerBar.classList.add("is-visible");
            playerStatusText.textContent = "播放中";
            updateEpisodePlaybackUI();
        });

        audio.addEventListener("pause", () => {
            playToggleBtn.textContent = "▶";
            if (audio.src) playerStatusText.textContent = "已暂停";
            updateEpisodePlaybackUI();
        });

        audio.addEventListener("ended", () => {
            playToggleBtn.textContent = "▶";
            playerStatusText.textContent = "已结束";
            updateEpisodePlaybackUI();
        });

        audio.addEventListener("timeupdate", () => {
            const progress = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            playerProgressBar.style.width = `${progress}%`;
            playerTime.textContent = formatTime(audio.currentTime);
            playerDuration.textContent = formatTime(audio.duration);
        });

        audio.addEventListener("loadedmetadata", () => {
            playerTime.textContent = formatTime(audio.currentTime);
            playerDuration.textContent = Number.isFinite(audio.duration) ? formatTime(audio.duration) : (currentEpisodeData?.duration || "0:00");
        });

        loadAlbums();
    </script>
</body>
</html>
