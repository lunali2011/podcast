<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇宙观与现代世界 | 播客专辑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            padding-bottom: 180px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .album-header { text-align: center; padding: 30px 15px; margin-bottom: 25px; }
        .album-cover {
            width: 160px; height: 160px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        .album-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .album-author { color: #a0a0a0; font-size: 15px; margin-bottom: 4px; }
        .album-meta { color: #666; font-size: 13px; }
        .episodes-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px;
        }
        .episode-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .episode-item:hover { background: rgba(255, 255, 255, 0.12); }
        .episode-item:last-child { margin-bottom: 0; }
        .episode-item.active {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.6);
        }
        .episode-header { display: flex; align-items: center; gap: 12px; }
        .episode-number {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
            flex-shrink: 0;
        }
        .episode-info { flex: 1; min-width: 0; }
        .episode-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
        .episode-duration { color: #888; font-size: 12px; }
        .play-btn {
            width: 44px; height: 44px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .play-btn:hover { transform: scale(1.08); }
        .play-btn:active { transform: scale(0.95); }
        .play-btn svg { width: 18px; height: 18px; fill: white; margin-left: 2px; }
        
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 15, 30, 0.98);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .player-bar.show { display: block; }
        .player-content { max-width: 800px; margin: 0 auto; }
        .player-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .player-title { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }
        .player-time { font-size: 11px; color: #888; white-space: nowrap; }
        .progress-bar {
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute; right: -6px; top: 50%;
            transform: translateY(-50%);
            width: 14px; height: 14px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 24px; }
        .control-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .control-btn:hover { color: white; }
        .control-btn.main {
            width: 56px; height: 56px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            color: white;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .control-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .control-btn.main svg { width: 26px; height: 26px; }
        .control-btn .speed-text { font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="album-header">
            <div class="album-cover">🌌</div>
            <h1 class="album-title">宇宙观与现代世界</h1>
            <p class="album-author">艾伦·麦克法兰 著</p>
            <p class="album-meta">6集 · 总时长约42分钟</p>
        </div>
        <div class="episodes-list" id="episodesList"></div>
    </div>
    
    <div class="player-bar" id="playerBar">
        <div class="player-content">
            <div class="player-info">
                <span class="player-title" id="playerTitle">未播放</span>
                <span class="player-time" id="playerTime">0:00 / 0:00</span>
            </div>
            <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="player-controls">
                <button class="control-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="control-btn main" id="playPauseBtn">
                    <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                    <svg viewBox="0 0 24 24" id="pauseIcon" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="control-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="control-btn" id="speedBtn"><span class="speed-text" id="speedText">1x</span></button>
            </div>
        </div>
    </div>
    
    <audio id="audioPlayer" preload="metadata"></audio>
    
    <script>
        const episodes = [
            { id: 1, title: '世界观是什么——我们日用而不知的玻璃瓶', duration: '7:32', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/98ab6334-4790-4b88-8739-ddeccb1061ad/audio_741bb88d-d001-4b82-b94c-b0c6b8114305.mp3' },
            { id: 2, title: '时间的发明：从循环到线性', duration: '7:51', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/edb0864f-14d2-44ad-8d04-058e50af4e4f/audio_a91f7bd5-6b59-4837-8b50-984167756afb.mp3' },
            { id: 3, title: '进步信仰：欧洲如何迷信明天会更好', duration: '6:51', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/adf93202-f1e7-44c4-93de-3653a264ab07/audio_7360b5a7-88c3-419f-b51e-c2d05849783e.mp3' },
            { id: 4, title: '西方看中国：从仰慕到蔑视的真相', duration: '7:02', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/1791a776-1d6b-43b4-9967-bd29be0a8715/audio_713ef968-9b57-4154-b9c2-a06b88d8c97f.mp3' },
            { id: 5, title: '一战如何摧毁进步信仰？', duration: '6:19', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/4b8cc050-6fed-46a1-996b-6c6942769b9a/audio_e5588150-7ae5-48f6-ad60-0eed8f663f39.mp3' },
            { id: 6, title: '未来交响乐：差异不是威胁', duration: '7:06', audioUrl: 'https://lf3-static.bytednsdoc.com/7625984057175851310-data_volume/generated/20260410/a59e62e3-1cdd-4a63-ad7a-27c803edb6d6/audio_af9c18d8-5ebb-443b-907e-8c0497ad2be3.mp3' }
        ];
        
        let currentEpisode = null;
        let isPlaying = false;
        let playbackRate = 1;
        const speeds = [0.75, 1, 1.25, 1.5, 2];
        let speedIndex = 1;
        
        const audio = document.getElementById('audioPlayer');
        const playerBar = document.getElementById('playerBar');
        const playerTitle = document.getElementById('playerTitle');
        const playerTime = document.getElementById('playerTime');
        const progressFill = document.getElementById('progressFill');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function renderEpisodes() {
            const list = document.getElementById('episodesList');
            list.innerHTML = episodes.map(ep => `
                <div class="episode-item" data-id="${ep.id}">
                    <div class="episode-header">
                        <span class="episode-number">${ep.id}</span>
                        <div class="episode-info">
                            <div class="episode-title">${ep.title}</div>
                            <div class="episode-duration">${ep.duration}</div>
                        </div>
                        <button class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.episode-item').forEach(item => {
                item.addEventListener('click', () => playEpisode(parseInt(item.dataset.id)));
            });
        }
        
        function playEpisode(id) {
            const episode = episodes.find(e => e.id === id);
            if (!episode) return;
            
            document.querySelectorAll('.episode-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-id="${id}"]`).classList.add('active');
            
            currentEpisode = episode;
            playerTitle.textContent = episode.title;
            playerBar.classList.add('show');
            
            audio.src = episode.audioUrl;
            audio.play();
        }
        
        function updatePlayButton() {
            playIcon.style.display = isPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlaying ? 'block' : 'none';
        }
        
        function togglePlay() {
            if (!currentEpisode) {
                playEpisode(1);
                return;
            }
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }
        
        document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
        
        document.getElementById('prevBtn').addEventListener('click', () => {
            if (!currentEpisode || currentEpisode.id === 1) return;
            playEpisode(currentEpisode.id - 1);
        });
        
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (!currentEpisode || currentEpisode.id === episodes.length) return;
            playEpisode(currentEpisode.id + 1);
        });
        
        document.getElementById('speedBtn').addEventListener('click', () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            playbackRate = speeds[speedIndex];
            audio.playbackRate = playbackRate;
            document.getElementById('speedText').textContent = playbackRate + 'x';
        });
        
        audio.addEventListener('play', () => { isPlaying = true; updatePlayButton(); });
        audio.addEventListener('pause', () => { isPlaying = false; updatePlayButton(); });
        audio.addEventListener('ended', () => {
            if (currentEpisode && currentEpisode.id < episodes.length) {
                playEpisode(currentEpisode.id + 1);
            }
        });
        
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = progress + '%';
            playerTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        });
        
        document.getElementById('progressBar').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });
        
        renderEpisodes();
    </script>
</body>
</html>
